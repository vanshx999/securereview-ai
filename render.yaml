services:
  - type: web
    name: securereview-ai-backend
    runtime: docker
    plan: free
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        fromDatabase:
          name: securereview-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: APP_URL
        value: https://securereview-ai-backend.onrender.com

  - type: static
    name: securereview-ai-frontend
    runtime: static
    plan: free
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviews: true
    envVars:
      - key: VITE_API_URL
        value: https://securereview-ai-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: securereview-db
    plan: free
    databaseType: postgres
    ipAllowList: []
